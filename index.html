<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <title>foesthoughts</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inconsolata:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f2ece0;
      --cream-dark: #e8e0d0;
      --ink: #1a1a18;
      --muted: #8a8478;
      --accent: #4a6741;
      --pale: #ddd6c8;
      --shadow: rgba(0,0,0,0.18);
      --cover-brown: #3d2b1f;
      --cover-mid: #5c3d2a;
      --cover-gold: #c9a84c;
      --cover-gold-dim: #8a6e32;
      --page-w: 440px;
      --page-h: 620px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1e1a16;
      color: var(--ink);
      font-family: 'Cormorant Garamond', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ===================== CLOSED BOOK ===================== */
    .closed-book {
      position: relative;
      z-index: 10;
      width: calc(var(--page-w) + 32px);
      height: var(--page-h);
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .closed-book:hover { transform: translateY(-4px); }
    .closed-book:hover .open-hint { opacity: 1; }

    .book-body { position: relative; width: 100%; height: 100%; }

    .book-spine {
      position: absolute; left: 0; top: 0; width: 32px; height: 100%;
      background: linear-gradient(to right, #1e1209, var(--cover-brown), #2e1e10);
      border-radius: 3px 0 0 3px;
      box-shadow: -4px 0 12px rgba(0,0,0,0.6), inset 2px 0 8px rgba(0,0,0,0.4);
      display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
    }

    .spine-title { writing-mode: vertical-rl; transform: rotate(180deg); font-family: 'Cormorant Garamond', serif; font-size: 0.7rem; font-style: italic; letter-spacing: 0.2em; color: var(--cover-gold-dim); text-transform: lowercase; }
    .spine-line { width: 1px; height: 40px; background: var(--cover-gold-dim); opacity: 0.4; margin: 8px 0; }

    .book-cover {
      position: absolute; left: 32px; top: 0; width: calc(100% - 32px); height: 100%;
      background: linear-gradient(135deg, var(--cover-mid) 0%, var(--cover-brown) 40%, #2a1a0e 100%);
      border-radius: 0 4px 4px 0;
      box-shadow: 6px 6px 30px rgba(0,0,0,0.7), inset -2px 0 8px rgba(0,0,0,0.3);
      overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2.5rem 2rem;
    }

    .book-cover::before {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='lt'%3E%3CfeTurbulence type='turbulence' baseFrequency='0.35' numOctaves='6' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23lt)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .cover-frame { position: absolute; inset: 14px; border: 1px solid var(--cover-gold-dim); opacity: 0.5; pointer-events: none; }
    .cover-frame-inner { position: absolute; inset: 20px; border: 1px solid var(--cover-gold-dim); opacity: 0.25; pointer-events: none; }

    .cover-corner { position: absolute; width: 24px; height: 24px; opacity: 0.6; }
    .cover-corner svg { width: 100%; height: 100%; }
    .cover-corner.tl { top: 22px; left: 22px; }
    .cover-corner.tr { top: 22px; right: 22px; transform: scaleX(-1); }
    .cover-corner.bl { bottom: 22px; left: 22px; transform: scaleY(-1); }
    .cover-corner.br { bottom: 22px; right: 22px; transform: scale(-1,-1); }

    .cover-ornament-top { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: var(--cover-gold-dim); opacity: 0.6; letter-spacing: 0.3em; margin-bottom: 1.2rem; }
    .cover-rule { width: 60%; height: 1px; background: linear-gradient(to right, transparent, var(--cover-gold), transparent); margin-bottom: 1.8rem; }
    .cover-title-text { font-family: 'Cormorant Garamond', serif; font-size: 2.4rem; font-weight: 400; font-style: italic; color: var(--cover-gold); text-align: center; line-height: 1.2; letter-spacing: 0.05em; text-shadow: 0 2px 12px rgba(0,0,0,0.5); margin-bottom: 0.6rem; }
    .cover-subtitle { font-family: 'Inconsolata', monospace; font-size: 0.55rem; letter-spacing: 0.25em; color: var(--cover-gold-dim); opacity: 0.7; text-transform: uppercase; margin-bottom: 1.8rem; }
    .cover-rule-2 { width: 40%; height: 1px; background: linear-gradient(to right, transparent, var(--cover-gold-dim), transparent); margin-bottom: 1.2rem; }
    .cover-year { font-family: 'Inconsolata', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: var(--cover-gold-dim); opacity: 0.5; }

    .pages-stack { position: absolute; right: -6px; top: 4px; width: 8px; height: calc(100% - 8px); background: repeating-linear-gradient(to bottom, #f0e8d8 0px, #f0e8d8 1px, #e0d8c8 2px, #e0d8c8 3px); border-radius: 0 2px 2px 0; box-shadow: 2px 0 6px rgba(0,0,0,0.3); }

    .open-hint { position: absolute; bottom: -2.2rem; left: 50%; transform: translateX(-50%); font-family: 'Inconsolata', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: #5a4e42; text-transform: uppercase; white-space: nowrap; opacity: 0; transition: opacity 0.4s ease; }

    /* ===================== OPEN BOOK ===================== */
    .open-book-wrapper { display: none; position: relative; z-index: 10; flex-direction: column; align-items: center; }
    .open-book-wrapper.visible { display: flex; }

    @keyframes bookOpen {
      0% { opacity: 0; transform: scaleX(0.15) scaleY(0.95); }
      60% { transform: scaleX(1.03) scaleY(1); }
      100% { opacity: 1; transform: scaleX(1) scaleY(1); }
    }
    .book-open-anim { animation: bookOpen 0.7s cubic-bezier(0.23, 1, 0.32, 1) forwards; }

    .book-bar { display: flex; align-items: center; justify-content: space-between; width: calc(var(--page-w) * 2 + 4px); margin-bottom: 1rem; padding: 0 0.25rem; }
    .book-title-open { font-family: 'Inconsolata', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: #7a6e60; cursor: pointer; transition: color 0.3s ease; }
    .book-title-open:hover { color: var(--accent); }
    .book-nav { font-family: 'Inconsolata', monospace; font-size: 0.6rem; letter-spacing: 0.15em; display: flex; gap: 1.5rem; }
    .book-nav a { color: #7a6e60; text-decoration: none; cursor: pointer; transition: color 0.3s ease; }
    .book-nav a:hover, .book-nav a.active { color: var(--accent); }

    .book { position: relative; width: calc(var(--page-w) * 2 + 4px); height: var(--page-h); perspective: 3000px; }
    .book::after { content: ''; position: absolute; left: 50%; top: 0; transform: translateX(-50%); width: 4px; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.22), rgba(0,0,0,0.06), rgba(0,0,0,0.22)); z-index: 50; pointer-events: none; }

    .page-spread { position: absolute; width: var(--page-w); height: var(--page-h); top: 0; background: var(--cream); overflow: hidden; }
    .page-spread::after { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 5; }
    .page-left { left: 0; border-radius: 3px 0 0 3px; box-shadow: -3px 4px 18px var(--shadow), inset -6px 0 16px rgba(0,0,0,0.04); }
    .page-right { left: var(--page-w); border-radius: 0 3px 3px 0; box-shadow: 3px 4px 18px var(--shadow), inset 6px 0 16px rgba(0,0,0,0.04); }

    .flip-out-right { position: absolute; left: var(--page-w); top: 0; width: var(--page-w); height: var(--page-h); background: var(--cream); overflow: hidden; transform-origin: left center; transform-style: preserve-3d; z-index: 60; backface-visibility: hidden; }
    .flip-out-left { position: absolute; left: 0; top: 0; width: var(--page-w); height: var(--page-h); background: var(--cream); overflow: hidden; transform-origin: right center; transform-style: preserve-3d; z-index: 60; backface-visibility: hidden; }

    @keyframes flipOutRight { 0% { transform: rotateY(0deg); box-shadow: none; } 40% { box-shadow: -18px 0 35px rgba(0,0,0,0.25); } 100% { transform: rotateY(-180deg); box-shadow: none; } }
    @keyframes flipOutLeft { 0% { transform: rotateY(0deg); box-shadow: none; } 40% { box-shadow: 18px 0 35px rgba(0,0,0,0.25); } 100% { transform: rotateY(180deg); box-shadow: none; } }

    .page-content { position: relative; z-index: 2; padding: 2.5rem 2.2rem; height: 100%; display: flex; flex-direction: column; }
    .page-section { font-family: 'Inconsolata', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 1.4rem; flex-shrink: 0; }

    .cover-title-inner { font-size: 2.5rem; font-weight: 300; font-style: italic; line-height: 1.15; margin-bottom: 1rem; flex-shrink: 0; }
    .cover-sub { font-family: 'Inconsolata', monospace; font-size: 0.58rem; font-weight: 300; letter-spacing: 0.1em; color: var(--muted); line-height: 1.8; margin-bottom: 1.8rem; flex-shrink: 0; }
    .cover-divider { height: 1px; background: linear-gradient(to right, var(--accent), transparent); margin-bottom: 1.6rem; flex-shrink: 0; }
    .toc-item { display: flex; align-items: baseline; gap: 0.5rem; margin-bottom: 0.9rem; cursor: pointer; opacity: 0.65; transition: opacity 0.3s ease; flex-shrink: 0; }
    .toc-item:hover { opacity: 1; }
    .toc-num { font-family: 'Inconsolata', monospace; font-size: 0.55rem; color: var(--accent); min-width: 18px; }
    .toc-name { font-size: 1.05rem; font-weight: 300; font-style: italic; flex: 1; }
    .toc-dots { flex: 1; border-bottom: 1px dotted var(--pale); margin-bottom: 3px; min-width: 20px; }
    .toc-type { font-family: 'Inconsolata', monospace; font-size: 0.5rem; color: var(--muted); letter-spacing: 0.08em; }
    .cover-mark { font-family: 'Inconsolata', monospace; font-size: 0.5rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-top: auto; flex-shrink: 0; }
    .cover-right-line { font-size: 0.9rem; font-weight: 300; font-style: italic; color: var(--ink); opacity: 0.2; line-height: 2.1; padding-left: 0.75rem; border-left: 1px solid var(--pale); margin-bottom: 0.7rem; flex-shrink: 0; }

    .entry-list-item { display: flex; align-items: baseline; gap: 0.75rem; padding: 0.85rem 0; border-bottom: 1px solid var(--pale); cursor: pointer; opacity: 0.7; transition: opacity 0.3s ease; flex-shrink: 0; }
    .entry-list-item:hover { opacity: 1; }
    .el-date { font-family: 'Inconsolata', monospace; font-size: 0.55rem; color: var(--muted); min-width: 60px; letter-spacing: 0.04em; }
    .el-title { font-size: 1.05rem; font-weight: 300; font-style: italic; flex: 1; }
    .el-arrow { font-family: 'Inconsolata', monospace; font-size: 0.55rem; color: var(--pale); transition: color 0.3s ease; }
    .entry-list-item:hover .el-arrow { color: var(--accent); }

    .entry-date-label { font-family: 'Inconsolata', monospace; font-size: 0.55rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 0.5rem; flex-shrink: 0; }
    .entry-title-large { font-size: 1.7rem; font-weight: 300; font-style: italic; line-height: 1.2; margin-bottom: 1.1rem; flex-shrink: 0; }
    .entry-photo-placeholder { width: 100%; height: 130px; background: var(--pale); margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; font-family: 'Inconsolata', monospace; font-size: 0.5rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; flex-shrink: 0; }
    .entry-photo { width: 100%; height: 130px; object-fit: cover; margin-bottom: 1rem; filter: grayscale(20%) contrast(1.05); display: block; flex-shrink: 0; cursor: pointer; }
    .entry-body-text { font-size: 0.9rem; font-weight: 300; color: var(--muted); line-height: 1.85; overflow: hidden; }

    .photo-grid-mini { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 0.4rem; flex: 1; min-height: 0; }
    .photo-grid-mini .ph { background: var(--pale); display: flex; align-items: center; justify-content: center; font-family: 'Inconsolata', monospace; font-size: 0.45rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; min-height: 0; }
    .photo-grid-mini img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(15%) contrast(1.05); cursor: pointer; transition: filter 0.3s ease; display: block; }
    .photo-grid-mini img:hover { filter: grayscale(0%) contrast(1.08); }

    /* LINES — space-between fills full page */
    .lines-page-content { position: relative; z-index: 2; padding: 2.5rem 2.2rem; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
    .lines-label { font-family: 'Inconsolata', monospace; font-size: 0.55rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; }
    .lines-label-ghost { font-family: 'Inconsolata', monospace; font-size: 0.55rem; opacity: 0; pointer-events: none; }
    .line-item { font-size: 0.92rem; font-weight: 300; font-style: italic; line-height: 1.45; color: var(--ink); opacity: 0.8; padding-left: 1rem; border-left: 1px solid var(--pale); transition: opacity 0.3s ease, border-left-color 0.3s ease; }
    .line-item:hover { opacity: 1; border-left-color: var(--accent); }

    .book-arrows { display: flex; justify-content: space-between; align-items: center; width: calc(var(--page-w) * 2 + 4px); margin-top: 1.2rem; padding: 0 0.25rem; }
    .arrow-btn { font-family: 'Inconsolata', monospace; font-size: 0.6rem; letter-spacing: 0.15em; color: #7a6e60; cursor: pointer; background: none; border: none; padding: 0.5rem 0; transition: color 0.3s ease; text-transform: uppercase; }
    .arrow-btn:hover { color: var(--accent); }
    .arrow-btn:disabled { opacity: 0.2; cursor: default; }
    .spread-indicator { font-family: 'Inconsolata', monospace; font-size: 0.55rem; letter-spacing: 0.12em; color: #5a504a; }

    .lightbox { display: none; position: fixed; inset: 0; background: rgba(20,18,15,0.97); z-index: 2000; align-items: center; justify-content: center; cursor: pointer; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 88vh; object-fit: contain; }
    .lightbox-close { position: absolute; top: 2rem; right: 2rem; font-family: 'Inconsolata', monospace; font-size: 0.65rem; letter-spacing: 0.15em; color: #7a6e60; cursor: pointer; text-transform: uppercase; }

    @media (max-width: 920px) { :root { --page-w: 320px; --page-h: 520px; } }
    @media (max-width: 680px) {
      :root { --page-w: 88vw; --page-h: 78vh; }
      .closed-book { width: calc(var(--page-w) + 24px); }
      .book { width: var(--page-w); }
      .book::after { display: none; }
      .book-bar, .book-arrows { width: var(--page-w); }
      .page-right { display: none; }
      .page-left { border-radius: 3px; }
    }
  </style>
</head>
<body>

  <div class="lightbox" id="lightbox">
    <span class="lightbox-close" id="lightbox-close">close</span>
    <img id="lightbox-img" src="" alt="" />
  </div>

<div class="closed-book" id="closed-book" onclick="openBook()">
    <div class="book-body">
      <div class="book-spine">
        <div class="spine-line"></div>
        <div class="spine-title">foesthoughts</div>
        <div class="spine-line"></div>
      </div>
      <div class="book-cover">
        <div class="cover-frame"></div>
        <div class="cover-frame-inner"></div>
        <div class="cover-corner tl"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2 L10 2 M2 2 L2 10 M2 2 L8 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c" opacity="0.5"/></svg></div>
        <div class="cover-corner tr"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2 L10 2 M2 2 L2 10 M2 2 L8 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c" opacity="0.5"/></svg></div>
        <div class="cover-corner bl"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2 L10 2 M2 2 L2 10 M2 2 L8 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c" opacity="0.5"/></svg></div>
        <div class="cover-corner br"><svg viewBox="0 0 24 24" fill="none"><path d="M2 2 L10 2 M2 2 L2 10 M2 2 L8 8" stroke="#c9a84c" stroke-width="0.8" opacity="0.7"/><circle cx="2" cy="2" r="1.5" fill="#c9a84c" opacity="0.5"/></svg></div>
        <div class="cover-ornament-top">❧</div>
        <div class="cover-rule"></div>
        <div class="cover-title-text">foesthoughts</div>
        <div class="cover-subtitle">always becoming</div>
        <div class="cover-rule-2"></div>
        <div class="cover-year">mmxxvi</div>
      </div>
      <div class="pages-stack"></div>
    </div>
    <div class="open-hint">open</div>
  </div>

  <div class="open-book-wrapper" id="open-book">
    <div class="book-bar book-open-anim">
      <span class="book-title-open" id="book-title-link">foesthoughts</span>
      <nav class="book-nav">
        <a id="nav-thoughts">thoughts</a>
        <a id="nav-photos">photos</a>
        <a id="nav-lines">lines</a>
      </nav>
    </div>
    <div class="book book-open-anim" id="book">
      <div class="page-spread page-left" id="page-left"></div>
      <div class="page-spread page-right" id="page-right"></div>
    </div>
    <div class="book-arrows book-open-anim">
      <button class="arrow-btn" id="btn-prev">← prev</button>
      <span class="spread-indicator" id="spread-indicator"></span>
      <button class="arrow-btn" id="btn-next">next →</button>
    </div>
  </div>

  <script>
    // =====================================================================

    const entries = [
      // To add a new entry, copy the block below and fill it in.

        date: 'may 2026',

      {

    const lines = [
      // Add new lines here — the book automatically adds more pages as needed.
      'she broke me in all the right places.',
      'I came from a small stream and decided to become a waterfall.',
      'most people are plagiarizing their lives nowadays.',
      'what time takes, it gives back.',
      'I\'m not a writer, I\'m just the writer of my life.',

      'live, don\'t be lived.',
      'I just need to let it be what it was and let it turn into a scar. A beautiful scar.',
      'I\'ve always been so terrified of losing my mind again, but in reality I\'m finally finding it again.',
      'quit trying to turn something off that deserves to be on.',
      'It\'s not even the side-effects, it\'s just the fear of the side-effects.',
      'she\'s still in your life, just differently than you wanted',
      'Trying to explain to people how I felt about her is like trying to describe a color they\'ve never seen.',
      'I don\'t run anymore. I sit. With me.',
      'I think that you think like I think, but I know I\'ll never know how you think.',
    ];

    const photos = [
      // Add photos here — grid automatically expands as you add more.
      // Format: { src: 'photos/yourfile.jpg', caption: 'champaign — may 2026' }
      // Leave as null for placeholder squares.
      null, null, null, null,
      null, null, null, null
    ];

    // =====================================================================
    // SPREAD BUILDER — automatic, no need to edit below
    // =====================================================================

    const LINES_PER_PAGE = 6;
    const PHOTOS_PER_SPREAD = 8; // 4 per page

    function buildSpreads() {
      const s = [];

      // Cover
      s.push({ type: 'cover' });

      // Thoughts index (only if entries exist)
      if (entries.length > 0) {
        s.push({ type: 'thoughts-index' });
        entries.forEach((e, i) => s.push({ type: 'entry', entryIndex: i }));
      }

      // Photos — auto-paginate every 8 photos
      if (photos.length > 0) {
        for (let i = 0; i < photos.length; i += PHOTOS_PER_SPREAD) {
          s.push({ type: 'photos', photoStart: i });
        }
      }

      // Lines — auto-paginate every 12 lines (6 per page)
      if (lines.length > 0) {
        const linesPerSpread = LINES_PER_PAGE * 2;
        for (let i = 0; i < lines.length; i += linesPerSpread) {
          s.push({ type: 'lines', lineStart: i });
        }
      }

      return s;
    }

    // =====================================================================
    // RENDER
    // =====================================================================

    function renderLeft(i) {
      const s = spreads[i];
      if (s.type === 'cover') return coverLeft();
      if (s.type === 'thoughts-index') return thoughtsIndex();
      if (s.type === 'entry') return entryPage(entries[s.entryIndex]);
      if (s.type === 'photos') return photosPage(photos.slice(s.photoStart, s.photoStart + 4), s.photoStart === 0);
      if (s.type === 'lines') return linesPage(lines.slice(s.lineStart, s.lineStart + LINES_PER_PAGE), true);
      return '';
    }

    function renderRight(i) {
      const s = spreads[i];
      if (s.type === 'cover') return coverRight();
      if (s.type === 'thoughts-index') return quietRight('turn the page →');
      if (s.type === 'entry') return quietRight('');
      if (s.type === 'photos') return photosPage(photos.slice(s.photoStart + 4, s.photoStart + 8), false);
      if (s.type === 'lines') return linesPage(lines.slice(s.lineStart + LINES_PER_PAGE, s.lineStart + LINES_PER_PAGE * 2), false);
      return '';
    }

    function coverLeft() {
      const sections = [];
      if (entries.length) sections.push({ num: 'i.', name: 'thoughts', type: 'writing', target: 'thoughts' });
      if (photos.length) sections.push({ num: 'ii.', name: 'photos', type: 'images', target: 'photos' });
      if (lines.length) sections.push({ num: 'iii.', name: 'lines', type: 'fragments', target: 'lines' });

      return `<div class="page-content">
        <div class="cover-title-inner">live, don't<br>be lived.</div>
        <div class="cover-sub">a stream of consciousness<br>finding a place to land.</div>
        <div class="cover-divider"></div>
        ${sections.map(s => `
          <div class="toc-item" data-action="section" data-target="${s.target}">
            <span class="toc-num">${s.num}</span><span class="toc-name">${s.name}</span><span class="toc-dots"></span><span class="toc-type">${s.type}</span>
          </div>`).join('')}
        <div class="cover-mark">always becoming</div>
      </div>`;
    }

    function coverRight() {
      const preview = lines.slice(0, Math.min(5, lines.length));
      return `<div class="page-content" style="justify-content:center;">
        ${preview.map(l => `<div class="cover-right-line">${l}</div>`).join('')}
      </div>`;
    }

    function thoughtsIndex() {
      return `<div class="page-content">
        <div class="page-section">thoughts</div>
        ${entries.map((e, i) => `
          <div class="entry-list-item" data-action="entry" data-target="${i}">
            <span class="el-date">${e.date}</span>
            <span class="el-title">${e.title}</span>
            <span class="el-arrow">→</span>
          </div>`).join('')}
        <div class="cover-mark">foesthoughts.com</div>
      </div>`;
    }

    function entryPage(entry) {
      return `<div class="page-content">
    <div class="page-section">thoughts</div>
    <div class="entry-date-label">${entry.date}</div>
    <div class="entry-title-large">${entry.title}</div>
    <div class="entry-body-text">${entry.body}</div>
  </div>`;
}
    function photosPage(photoSlice, showLabel) {
      return `<div class="page-content">
        ${showLabel ? '<div class="page-section">photos</div>' : '<div class="page-section" style="opacity:0;pointer-events:none"> </div>'}
        <div class="photo-grid-mini">
          ${photoSlice.map(p => p
            ? `<img src="${p.src}" alt="" data-action="lightbox" data-src="${p.src}" />`
            : `<div class="ph">—</div>`
          ).join('')}
        </div>
      </div>`;
    }

    function linesPage(pageLines, showLabel) {
      if (!pageLines.length) return quietRight('');
      return `<div class="lines-page-content">
        ${showLabel ? '<div class="lines-label">lines</div>' : '<div class="lines-label-ghost">—</div>'}
        ${pageLines.map(l => `<div class="line-item">${l}</div>`).join('')}
      </div>`;
    }

    function quietRight(msg) {
      return `<div class="page-content" style="justify-content:flex-end;">
        <div style="font-family:'Inconsolata',monospace;font-size:0.5rem;letter-spacing:0.15em;color:var(--muted);text-transform:uppercase;">${msg}</div>
      </div>`;
    }

    // =====================================================================
    // ENGINE
    // =====================================================================

    let spreads = buildSpreads();
    let currentSpread = 0;
    let isAnimating = false;
    const book = document.getElementById('book');

    function paint(i) {
      document.getElementById('page-left').innerHTML = renderLeft(i);
      document.getElementById('page-right').innerHTML = renderRight(i);
      bindClicks();
      updateUI();
    }

    function bindClicks() {
      document.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', handleDataAction);
      });
    }

    function handleDataAction(e) {
      const el = e.currentTarget;
      const action = el.dataset.action;
      if (action === 'section') goToSection(el.dataset.target);
      if (action === 'entry') goToEntry(parseInt(el.dataset.target));
      if (action === 'lightbox') openLightbox(el.dataset.src);
    }

    function goToSection(section) {
      const typeMap = { thoughts: 'thoughts-index', photos: 'photos', lines: 'lines' };
      const idx = spreads.findIndex(s => s.type === typeMap[section]);
      if (idx !== -1 && idx !== currentSpread) animateTo(idx);
    }

    function goToEntry(entryIndex) {
      const idx = spreads.findIndex(s => s.type === 'entry' && s.entryIndex === entryIndex);
      if (idx !== -1 && idx !== currentSpread) animateTo(idx);
    }

    function animateTo(target) {
      if (isAnimating) return;
      if (Math.abs(target - currentSpread) > 2) {
        currentSpread = target;
        paint(currentSpread);
        return;
      }
      doFlip(target > currentSpread ? 1 : -1, target);
    }

    function doFlip(dir, targetIndex) {
      if (isAnimating) return;
      const next = targetIndex !== undefined ? targetIndex : currentSpread + dir;
      if (next < 0 || next >= spreads.length) return;

      isAnimating = true;
      const DURATION = 600;
      const overlay = document.createElement('div');

      if (dir > 0) {
        overlay.className = 'flip-out-right';
        overlay.innerHTML = renderRight(currentSpread);
        book.appendChild(overlay);
        overlay.offsetHeight;
        overlay.style.animation = `flipOutRight ${DURATION}ms cubic-bezier(0.645,0.045,0.355,1.000) forwards`;
      } else {
        overlay.className = 'flip-out-left';
        overlay.innerHTML = renderLeft(currentSpread);
        book.appendChild(overlay);
        overlay.offsetHeight;
        overlay.style.animation = `flipOutLeft ${DURATION}ms cubic-bezier(0.645,0.045,0.355,1.000) forwards`;
      }

      document.getElementById('page-left').innerHTML = renderLeft(next);
      document.getElementById('page-right').innerHTML = renderRight(next);

      setTimeout(() => {
        overlay.remove();
        currentSpread = next;
        bindClicks();
        updateUI();
        isAnimating = false;
      }, DURATION);
    }

    function updateUI() {
      document.getElementById('btn-prev').disabled = currentSpread === 0;
      document.getElementById('btn-next').disabled = currentSpread === spreads.length - 1;
      document.getElementById('spread-indicator').textContent = (currentSpread + 1) + ' / ' + spreads.length;
      const sec = spreads[currentSpread].type;
      document.getElementById('nav-thoughts').classList.toggle('active', sec === 'thoughts-index' || sec === 'entry');
      document.getElementById('nav-photos').classList.toggle('active', sec === 'photos');
      document.getElementById('nav-lines').classList.toggle('active', sec === 'lines');
    }

    function openBook() {  
      document.getElementById('closed-book').style.display = 'none';
  document.getElementById('open-book').classList.add('visible');
  paint(0);
}
      
});

    document.getElementById('btn-prev').addEventListener('click', () => doFlip(-1));
    document.getElementById('btn-next').addEventListener('click', () => doFlip(1));
    document.getElementById('book-title-link').addEventListener('click', () => animateTo(0));
    document.getElementById('nav-thoughts').addEventListener('click', () => goToSection('thoughts'));
    document.getElementById('nav-photos').addEventListener('click', () => goToSection('photos'));
    document.getElementById('nav-lines').addEventListener('click', () => goToSection('lines'));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') doFlip(1);
      if (e.key === 'ArrowLeft') doFlip(-1);
      if (e.key === 'Escape') closeLightbox();
    });

    function openLightbox(src) {
      document.getElementById('lightbox-img').src = src;
      document.getElementById('lightbox').classList.add('active');
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
    }

    document.getElementById('lightbox').addEventListener('click', function(e) { if (e.target === this) closeLightbox(); });
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  </script>

</body>
</html>
